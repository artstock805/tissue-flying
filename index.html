<title>티슈 날리기</title>
<style>
:root{
  --bg-light:#f4f5f7; --bg-dark:#0f1117;
  --frame-light:#e7e9ee; --frame-dark:#1a1d27;
  --text-light:#1b1e27; --text-dark:#e8e9ee;
  --sub-light:#6b7280; --sub-dark:#8b8fa3;
  --gold:#ffcc33; --danger:#ff4757; --wind:#4da6ff;
}
:root{ color-scheme: light dark; }
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
html,body{ touch-action:none; overscroll-behavior:none; }
body{
  margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,sans-serif;
  background:var(--bg-light); color:var(--text-light);
}
@media (prefers-color-scheme: dark){ body{ background:var(--bg-dark); color:var(--text-dark); } }
:root[data-theme="dark"] body{ background:var(--bg-dark); color:var(--text-dark); }
:root[data-theme="light"] body{ background:var(--bg-light); color:var(--text-light); }

/* 휴대폰 프레임: 실제 모바일 화면 비율을 흉내낸 틀 */
.frame{
  position:relative; width:340px; height:600px; border-radius:34px; padding:10px;
  background:var(--frame-light); box-shadow:0 14px 40px rgba(0,0,0,.16);
}
@media (prefers-color-scheme: dark){ .frame{ background:var(--frame-dark); box-shadow:0 14px 40px rgba(0,0,0,.5); } }
:root[data-theme="dark"] .frame{ background:var(--frame-dark); }
:root[data-theme="light"] .frame{ background:var(--frame-light); }

.screen{ position:relative; width:100%; height:100%; border-radius:24px; overflow:hidden; }
canvas{ display:block; width:100%; height:100%; }

/* 상단 HUD: 타이머(좌) / 최고기록(우) */
.hud{ position:absolute; top:14px; left:0; right:0; display:flex; justify-content:space-between; padding:0 16px; pointer-events:none; }
.hud .timer{ font-size:22px; font-weight:800; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.4); font-variant-numeric:tabular-nums; }
.hud .best{ font-size:13px; font-weight:600; color:rgba(255,255,255,.85); text-shadow:0 1px 4px rgba(0,0,0,.4); align-self:flex-start; padding-top:4px; }

/* 단계 안내 텍스트: 화면 중앙 상단에 잠깐 나타났다 사라짐 */
.stage-msg{
  position:absolute; top:70px; left:0; right:0; text-align:center; pointer-events:none;
  font-size:16px; font-weight:700; color:#fff; text-shadow:0 1px 6px rgba(0,0,0,.5);
  opacity:0; transition:opacity .4s;
}
.stage-msg.show{ opacity:1; }

/* 시작 화면 */
.overlay{
  position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  text-align:center; color:#fff;
}
.overlay.show{ display:flex; }
.start-overlay{ background:linear-gradient(180deg,#7fb8ff,#eaf4ff); }
.start-tissue{ font-size:64px; animation:float 2.2s ease-in-out infinite; }
@keyframes float{ 0%,100%{ transform:translateY(0) rotate(-4deg);} 50%{ transform:translateY(-14px) rotate(4deg);} }
.start-hint{ font-size:15px; font-weight:700; color:#1b1e27; animation:pulse 1.6s ease-in-out infinite; }
@keyframes pulse{ 0%,100%{ opacity:.55; } 50%{ opacity:1; } }

/* 카운트다운 */
.countdown-num{ font-size:96px; font-weight:800; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.4); }

/* 게임오버 화면 */
.gameover-overlay{ background:rgba(10,14,22,.72); backdrop-filter:blur(4px); }
.go-score{ font-size:46px; font-weight:800; font-variant-numeric:tabular-nums; }
.go-newbest{ font-size:15px; font-weight:800; color:var(--gold); height:20px; }
.go-best-box{ background:#20242f; padding:10px 22px; border-radius:12px; font-size:14px; color:#fff; font-variant-numeric:tabular-nums; }
.go-hint{ font-size:13px; color:rgba(255,255,255,.7); margin-top:6px; }
</style>

<div class="frame">
  <div class="screen">
    <canvas id="game" width="320" height="580"></canvas>

    <div class="hud">
      <div class="timer" id="timer">0.0초</div>
      <div class="best" id="bestLabel">Best 0.0초</div>
    </div>
    <div class="stage-msg" id="stageMsg"></div>

    <div class="overlay start-overlay show" id="startOverlay">
      <div class="start-tissue">🧻</div>
      <div class="start-hint">여기를 터치하세요</div>
    </div>

    <div class="overlay" id="countdownOverlay">
      <div class="countdown-num" id="countdownNum">3</div>
    </div>

    <div class="overlay gameover-overlay" id="gameoverOverlay">
      <div class="go-score" id="goScore">0.0초</div>
      <div class="go-newbest" id="goNewBest"></div>
      <div class="go-best-box" id="goBestBox">최고 기록 0.0초</div>
      <div class="go-hint">화면을 터치하면 다시 시작</div>
    </div>
  </div>
</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const CW=canvas.width, CH=canvas.height;

const timerEl=document.getElementById('timer');
const bestLabelEl=document.getElementById('bestLabel');
const stageMsgEl=document.getElementById('stageMsg');
const startOverlay=document.getElementById('startOverlay');
const countdownOverlay=document.getElementById('countdownOverlay');
const countdownNumEl=document.getElementById('countdownNum');
const gameoverOverlay=document.getElementById('gameoverOverlay');
const goScoreEl=document.getElementById('goScore');
const goNewBestEl=document.getElementById('goNewBest');
const goBestBoxEl=document.getElementById('goBestBox');

const BEST_KEY='tissueFlyingBest';
let best=parseFloat(localStorage.getItem(BEST_KEY)||'0');
bestLabelEl.textContent=`Best ${best.toFixed(1)}초`;

// 물리 상수(참고 게임의 값을 그대로 채택 — 60fps 서브스텝 기준 "프레임당" 단위)
const GRAVITY=0.15;
const AIR_RESISTANCE=0.985;
const WIND_STRENGTH=0.8;
const WIND_RADIUS=250;       // 이 반경 밖에서는 바람이 닿지 않는다
const ROTATION_FACTOR=0.003;
const ROTATION_DAMPING=0.95;
const TISSUE_W=60, TISSUE_H=50;
const WALL_ZONE=80;          // 벽/천장 근처 난기류가 시작되는 거리
const FLOOR_RISE_START=15, FLOOR_RISE_SPEED=3, FLOOR_MIN_SPACE=150;

// 게임 상태: start -> countdown -> playing -> gameover
let state='start';
let elapsed=0;           // 체공 시간(초)
let lastTime=null;
let rafId;

// 첫 게임이 시작되기 전(start 오버레이 상태)에도 매 프레임 배경/바닥을 그리므로
// floorY/tissue는 처음부터 유한한 값으로 초기화해둔다(resetPhysics에서 다시 설정됨)
let tissue={ x:CW/2, y:CH*0.35, vx:0, vy:0, angle:0, angularVel:0 };
let floorY=CH-40, baseFloorY=CH-40;
let particles=[], gustVisuals=[], dangerZones=[];
let nextGustTime=0, nextZoneTime=0, screenShake=0;
const wobbleOffsets=Array.from({length:8},()=>Math.random()*Math.PI*2);

// 배경 입체감을 위한 패럴랙스 구름(층이 멀수록 작고 흐리고 느리게 움직인다)
const clouds=Array.from({length:9},(_,i)=>{
  const layer=i%3;
  return {
    layer,
    x:Math.random()*CW,
    y:30+Math.random()*(CH*0.55),
    r:16+layer*14+Math.random()*10,
    speed:0.08+layer*0.07+Math.random()*0.05,
    alpha:0.08+layer*0.07
  };
});
function updateClouds(dt){
  for(const c of clouds){
    c.x += c.speed*60*dt;
    if(c.x-c.r>CW+20) c.x=-c.r-20;
  }
}
function drawClouds(){
  for(const c of clouds){
    const g=ctx.createRadialGradient(c.x,c.y,0, c.x,c.y,c.r);
    g.addColorStop(0,`rgba(255,255,255,${c.alpha})`);
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.ellipse(c.x,c.y,c.r,c.r*0.6,0,0,Math.PI*2);
    ctx.fill();
  }
}
function drawVignette(){
  const g=ctx.createRadialGradient(CW/2,CH*0.38,CH*0.15, CW/2,CH*0.45,CH*0.85);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(15,25,45,0.16)');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,CW,CH);
}

// 터치(포인터) 상태: 마지막으로 누른 포인터 위치에서만 바람이 분다
const pointers=new Map();
let activeId=null;

function resetPhysics(){
  tissue={ x:CW/2, y:CH*0.35, vx:0, vy:0, angle:0, angularVel:0 };
  baseFloorY=CH-40;
  floorY=baseFloorY;
  particles=[]; gustVisuals=[]; dangerZones=[];
  nextGustTime=10; nextZoneTime=20; screenShake=0;
  elapsed=0;
  stageMsgEl.classList.remove('show');
}

function localPos(clientX, clientY){
  const rect=canvas.getBoundingClientRect();
  return { x:(clientX-rect.left)*(CW/rect.width), y:(clientY-rect.top)*(CH/rect.height) };
}

// 화면 탭에 따른 상태 전이 처리(시작/재시작은 항상 카운트다운을 거친다)
function handleTap(){
  if(state==='start' || state==='gameover'){
    startCountdown();
  }
  // 카운트다운 중 탭은 무시, 플레이 중 탭은 바람으로만 작동(별도 처리 없음)
}

function startCountdown(){
  state='countdown';
  startOverlay.classList.remove('show');
  gameoverOverlay.classList.remove('show');
  countdownOverlay.classList.add('show');
  let n=3;
  countdownNumEl.textContent=n;
  const tick=()=>{
    n--;
    if(n>0){
      countdownNumEl.textContent=n;
      setTimeout(tick,700);
    } else {
      countdownOverlay.classList.remove('show');
      resetPhysics();
      state='playing';
      lastTime=null;
    }
  };
  setTimeout(tick,700);
}

function announceStage(text){
  stageMsgEl.textContent=text;
  stageMsgEl.classList.add('show');
  setTimeout(()=>stageMsgEl.classList.remove('show'), 1500);
}

function triggerGameOver(){
  state='gameover';
  const score=elapsed;
  const isNewBest=score>best;
  if(isNewBest){ best=score; localStorage.setItem(BEST_KEY, best.toFixed(2)); }
  bestLabelEl.textContent=`Best ${best.toFixed(1)}초`;
  goScoreEl.textContent=`${score.toFixed(1)}초`;
  goNewBestEl.textContent=isNewBest?'New Best!':'';
  goBestBoxEl.textContent=`최고 기록 ${best.toFixed(1)}초`;
  gameoverOverlay.classList.add('show');
}

function activePointer(){
  if(activeId!==null && pointers.has(activeId)) return pointers.get(activeId);
  return null;
}

// 터치 지점에서 티슈 쪽으로 바람을 불어넣는다(반경 250px 밖은 영향 없음, 가까울수록 강함)
function applyWind(x,y){
  const dx=tissue.x-x, dy=tissue.y-y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<1) return;
  const strength=Math.max(0, 1-dist/WIND_RADIUS)*WIND_STRENGTH;
  if(strength<=0) return;
  const nx=dx/dist, ny=dy/dist;
  tissue.vx += nx*strength*12;
  tissue.vy += ny*strength*12;
  tissue.angularVel += nx*strength*ROTATION_FACTOR*40;
  spawnWindParticles(x,y,nx,ny);
}

function spawnWindParticles(x,y,nx,ny){
  for(let i=0;i<6;i++){
    const spread=(Math.random()-0.5)*1.5;
    particles.push({
      x:x+(Math.random()-0.5)*20, y:y+(Math.random()-0.5)*20,
      vx:(nx+spread*(-ny))*(3+Math.random()*3), vy:(ny+spread*nx)*(3+Math.random()*3),
      life:1, decay:0.02+Math.random()*0.02, size:2+Math.random()*3
    });
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.96; p.vy*=0.96;
    p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
}

function drawParticles(){
  for(const p of particles){
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(120,160,210,${p.life*0.5})`;
    ctx.fill();
  }
}

function spawnGustStreaks(gx,gy){
  const count=15+Math.floor(Math.random()*10);
  for(let i=0;i<count;i++){
    const startX=gx>0?-20:CW+20;
    const startY=Math.random()*CH;
    const speed=8+Math.random()*12;
    gustVisuals.push({
      x:startX+(Math.random()-0.5)*CW*0.3, y:startY,
      vx:gx*speed, vy:(gy*0.3+(Math.random()-0.5)*0.5)*speed*0.4,
      len:30+Math.random()*60, life:0.6+Math.random()*0.5, width:0.5+Math.random()*1.5
    });
  }
}

function updateGustVisuals(dt){
  for(let i=gustVisuals.length-1;i>=0;i--){
    const g=gustVisuals[i];
    g.x+=g.vx; g.y+=g.vy; g.life-=dt*1.5;
    if(g.life<=0) gustVisuals.splice(i,1);
  }
}

function drawGustVisuals(){
  for(const g of gustVisuals){
    const alpha=Math.min(g.life,0.4)*0.6;
    const speed=Math.sqrt(g.vx*g.vx+g.vy*g.vy);
    const nx=speed>0?g.vx/speed:1, ny=speed>0?g.vy/speed:0;
    ctx.beginPath(); ctx.moveTo(g.x,g.y); ctx.lineTo(g.x-nx*g.len, g.y-ny*g.len);
    ctx.strokeStyle=`rgba(120,150,190,${alpha})`; ctx.lineWidth=g.width; ctx.stroke();
  }
}

// 화면 중간 어딘가에 떠서 위아래로 오가는 위험 구간(닿으면 빠르게 끌려 내려간다)
function spawnDangerZone(){
  const zoneH=40+Math.random()*30;
  const minY=CH*0.15;
  const maxY=Math.max(minY, floorY-zoneH-20);
  const y=minY+Math.random()*(maxY-minY);
  const speed=(0.3+Math.random()*0.5)*(Math.random()<0.5?1:-1);
  const duration=6+Math.random()*4;
  dangerZones.push({ y, h:zoneH, speed, life:duration, maxLife:duration });
}

function drawDangerZones(){
  for(const z of dangerZones){
    const fadeIn=Math.min(1,(z.maxLife-z.life)*3);
    const fadeOut=Math.min(1, z.life*2);
    const alpha=Math.min(fadeIn,fadeOut)*0.28;
    ctx.fillStyle=`rgba(255,71,87,${alpha})`;
    ctx.fillRect(0,z.y,CW,z.h);
    ctx.strokeStyle=`rgba(255,71,87,${alpha*2})`;
    ctx.lineWidth=1; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(0,z.y); ctx.lineTo(CW,z.y); ctx.moveTo(0,z.y+z.h); ctx.lineTo(CW,z.y+z.h); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=`rgba(255,71,87,${Math.min(1,alpha*3)})`;
    ctx.font='bold 11px sans-serif';
    ctx.textAlign='right';
    ctx.fillText('DANGER', CW-10, z.y+14);
  }
}

// 난이도 단계: 돌풍(10초~) / 위험 구간(20초~). 매 프레임 한 번씩(서브스텝 아님) 호출
function updateHazards(dt){
  const t=elapsed;
  const difficulty=Math.min(t/60,1);

  if(t>=10 && t>=nextGustTime){
    const gustStrength=(1+difficulty*2)*0.4;
    const angle=Math.random()*Math.PI*2;
    const gx=Math.cos(angle), gy=Math.sin(angle);
    tissue.vx += gx*gustStrength;
    tissue.vy += gy*gustStrength*0.5 + gustStrength*0.3;
    tissue.angularVel += (Math.random()-0.5)*0.05;
    const interval=Math.max(2, 5-difficulty*3);
    nextGustTime=t+interval+Math.random()*interval;
    announceStage('돌풍!');
    spawnGustStreaks(gx,gy);
    screenShake=0.4;
  }
  updateGustVisuals(dt);
  if(screenShake>0) screenShake*=0.9;

  if(t>=20 && t>=nextZoneTime){
    spawnDangerZone();
    announceStage('위험 구간!');
    const interval=Math.max(3, 8-difficulty*4);
    nextZoneTime=t+interval+Math.random()*3;
  }
  for(let i=dangerZones.length-1;i>=0;i--){
    const z=dangerZones[i];
    z.y+=z.speed;
    z.life-=dt;
    if(z.y<CH*0.1){ z.y=CH*0.1; z.speed=Math.abs(z.speed); }
    if(z.y+z.h>floorY-10){ z.y=floorY-10-z.h; z.speed=-Math.abs(z.speed); }
    if(tissue.y>z.y && tissue.y<z.y+z.h){
      tissue.vy += 0.3+difficulty*0.3;
      tissue.vx += (Math.random()-0.5)*0.2;
    }
    if(z.life<=0) dangerZones.splice(i,1);
  }
}

function getGravityMultiplier(){
  if(elapsed<30) return 1;
  return 1+Math.min((elapsed-30)/60, 0.8);
}

// 바닥 상승: 15초부터 서서히 올라오되 최소 150px 공간은 항상 보장
function getRisingFloorY(){
  if(elapsed<FLOOR_RISE_START) return baseFloorY;
  const risen=(elapsed-FLOOR_RISE_START)*FLOOR_RISE_SPEED;
  return Math.max(FLOOR_MIN_SPACE, baseFloorY-risen);
}

// 벽/천장 구석에 머물지 못하도록 가까워질수록 불규칙한 바람을 더한다
function applyWallTurbulence(){
  const leftDist=tissue.x, rightDist=CW-tissue.x, topDist=tissue.y;
  const nearWall=Math.min(leftDist,rightDist,topDist);
  if(nearWall<WALL_ZONE){
    const intensity=(1-nearWall/WALL_ZONE)*0.15;
    tissue.vy += intensity;
    tissue.vx += (Math.random()-0.5)*intensity*2;
    if(topDist<WALL_ZONE) tissue.vy += intensity*0.5;
  }
}

// 물리 업데이트: 실제 프레임 간격(dt)과 무관하게 1/60초 단위로 고정 서브스텝을 밟는다
function updatePhysics(dt){
  const steps=Math.round(dt*60);
  const mult=getGravityMultiplier();
  for(let i=0;i<steps;i++){
    tissue.vy += GRAVITY*mult;
    tissue.vx *= AIR_RESISTANCE;
    tissue.vy *= AIR_RESISTANCE;
    tissue.x += tissue.vx;
    tissue.y += tissue.vy;
    tissue.angularVel *= ROTATION_DAMPING;
    tissue.angle += tissue.angularVel;
  }

  // 벽/천장에 부딪히면 튕겨 나오고, 화면 밖으로는 나가지 않는다
  if(tissue.x<TISSUE_W/2){ tissue.x=TISSUE_W/2; tissue.vx*=-0.3; }
  if(tissue.x>CW-TISSUE_W/2){ tissue.x=CW-TISSUE_W/2; tissue.vx*=-0.3; }
  if(tissue.y<TISSUE_H/2){ tissue.y=TISSUE_H/2; tissue.vy*=-0.3; }

  floorY=getRisingFloorY();
  applyWallTurbulence();

  // 바닥에 닿으면 게임 오버
  if(tissue.y+TISSUE_H/2 >= floorY) triggerGameOver();
}

function drawBackground(){
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,'#9fcdfb');
  g.addColorStop(0.55,'#cfe6ff');
  g.addColorStop(1,'#f2f9ff');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,CW,CH);
  drawClouds();
}

function drawFloor(){
  const h=CH-floorY;
  const rising=elapsed>=FLOOR_RISE_START;
  if(rising){
    // 상승 중인 바닥: 빨간 줄무늬
    ctx.save();
    ctx.beginPath(); ctx.rect(0,floorY,CW,h); ctx.clip();
    ctx.fillStyle='#3a2f2f'; ctx.fillRect(0,floorY,CW,h);
    ctx.strokeStyle='rgba(255,80,90,.9)'; ctx.lineWidth=8;
    for(let x=-CH; x<CW+CH; x+=26){
      ctx.beginPath(); ctx.moveTo(x,CH); ctx.lineTo(x+CH-floorY,floorY); ctx.stroke();
    }
    ctx.restore();
  } else {
    const g=ctx.createLinearGradient(0,floorY,0,CH);
    g.addColorStop(0,'#6d5847');
    g.addColorStop(1,'#453830');
    ctx.fillStyle=g;
    ctx.fillRect(0,floorY,CW,h);
  }
  // 바닥 윗면 하이라이트(턱처럼 도드라져 보이게)
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillRect(0,floorY,CW,2);

  // 바닥 접근 경고: 티슈가 가까워질수록 화면 아래가 붉게 빛남
  if(state==='playing'){
    const distToFloor=floorY-(tissue.y+TISSUE_H/2);
    const totalSpace=floorY-TISSUE_H;
    const ratio=1-Math.max(0, Math.min(1, distToFloor/(totalSpace*0.35)));
    if(ratio>0){
      const glow=ctx.createLinearGradient(0,floorY-160,0,floorY);
      glow.addColorStop(0,'rgba(255,60,70,0)');
      glow.addColorStop(1,`rgba(255,60,70,${ratio*0.5})`);
      ctx.fillStyle=glow;
      ctx.fillRect(0,floorY-160,CW,160);
    }
  }
}

function drawWindHint(){
  const p=activePointer();
  if(p && state==='playing'){
    ctx.beginPath();
    ctx.arc(p.x,p.y,WIND_RADIUS,0,Math.PI*2);
    ctx.strokeStyle='rgba(77,166,255,.18)';
    ctx.lineWidth=2;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(p.x,p.y,26,0,Math.PI*2);
    ctx.strokeStyle='rgba(77,166,255,.55)';
    ctx.lineWidth=3;
    ctx.stroke();
  }
}

function drawShadow(){
  const shadowY=floorY+5;
  const heightRatio=Math.max(0, 1-(floorY-tissue.y)/(floorY-TISSUE_H));
  const shadowW=TISSUE_W*0.6*(0.3+heightRatio*0.7);
  const shadowH=4*(0.3+heightRatio*0.7);
  ctx.beginPath();
  ctx.ellipse(tissue.x, shadowY, shadowW, shadowH, 0, 0, Math.PI*2);
  ctx.fillStyle=`rgba(0,0,0,${heightRatio*0.15})`;
  ctx.fill();
}

// 티슈를 하늘하늘한 사각형으로 그린다(가장자리마다 각기 다른 위상으로 흔들림)
function drawTissue(t){
  ctx.save();
  ctx.translate(tissue.x, tissue.y);
  ctx.rotate(tissue.angle);

  const hw=TISSUE_W/2, hh=TISSUE_H/2, wobbleAmp=3;
  const corners=[ {x:-hw,y:-hh}, {x:hw,y:-hh}, {x:hw,y:hh}, {x:-hw,y:hh} ];
  const edgePoints=[];
  for(let side=0; side<4; side++){
    const from=corners[side], to=corners[(side+1)%4];
    edgePoints.push(from);
    edgePoints.push({
      x:(from.x+to.x)/2 + Math.sin(t*3+wobbleOffsets[side])*wobbleAmp,
      y:(from.y+to.y)/2 + Math.cos(t*3+wobbleOffsets[side+4])*wobbleAmp
    });
  }

  ctx.beginPath();
  ctx.moveTo(edgePoints[0].x, edgePoints[0].y);
  for(let i=0;i<edgePoints.length;i++){
    const curr=edgePoints[i], next=edgePoints[(i+1)%edgePoints.length];
    ctx.quadraticCurveTo(curr.x, curr.y, (curr.x+next.x)/2, (curr.y+next.y)/2);
  }
  ctx.closePath();

  // 입체감 1: 은은한 그라디언트 + 드롭섀도로 종이 두께감을 표현
  ctx.save();
  ctx.shadowColor='rgba(30,40,60,0.35)';
  ctx.shadowBlur=10;
  ctx.shadowOffsetX=3;
  ctx.shadowOffsetY=5;
  const base=ctx.createLinearGradient(-hw,-hh,hw,hh);
  base.addColorStop(0,'#ffffff');
  base.addColorStop(0.55,'#f2f2f2');
  base.addColorStop(1,'#dcdcdc');
  ctx.fillStyle=base;
  ctx.fill();
  ctx.restore();
  ctx.strokeStyle='rgba(150,150,150,0.6)';
  ctx.lineWidth=1.2;
  ctx.stroke();

  // 입체감 2: 좌상단 광택(하이라이트)을 티슈 모양 안쪽으로만 클리핑해서 그림
  ctx.save();
  ctx.clip();
  const sheen=ctx.createRadialGradient(-hw*0.35,-hh*0.45,0, -hw*0.35,-hh*0.45, hw*1.1);
  sheen.addColorStop(0,'rgba(255,255,255,0.85)');
  sheen.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sheen;
  ctx.fillRect(-hw-4,-hh-4,TISSUE_W+8,TISSUE_H+8);
  ctx.restore();

  // 입체감 3: 밝은 선/어두운 선을 짝지어 그어 접힌 주름이 도드라져 보이게 함
  function crease(x1,y1,cx,cy,x2,y2){
    ctx.beginPath(); ctx.moveTo(x1,y1+0.6); ctx.quadraticCurveTo(cx,cy+0.6,x2,y2+0.6);
    ctx.strokeStyle='rgba(120,120,120,0.35)'; ctx.lineWidth=1; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x1,y1-0.6); ctx.quadraticCurveTo(cx,cy-0.6,x2,y2-0.6);
    ctx.strokeStyle='rgba(255,255,255,0.75)'; ctx.lineWidth=1; ctx.stroke();
  }
  crease(-hw*0.3,-hh*0.5, 0,hh*0.1, hw*0.3,-hh*0.4);
  crease(-hw*0.1,hh*0.1, hw*0.1,hh*0.4, hw*0.4,hh*0.15);
  crease(-hw*0.5,-hh*0.1, -hw*0.15,hh*0.3, -hw*0.05,hh*0.55);

  ctx.restore();
}

function draw(t){
  drawBackground();
  drawFloor();
  if(state==='playing'){
    drawDangerZones();
    drawGustVisuals();
    drawParticles();
    drawShadow();
    drawTissue(t);
    drawWindHint();
  } else if(state==='countdown'){
    drawShadow();
    drawTissue(t);
  }
  drawVignette();
}

function loop(time){
  if(lastTime===null) lastTime=time;
  const dt=Math.min(0.033, (time-lastTime)/1000);
  lastTime=time;
  const t=time/1000;

  updateClouds(dt); // 배경 구름은 게임 상태와 무관하게 항상 흘러간다

  if(state==='playing'){
    elapsed+=dt;
    timerEl.textContent=`${elapsed.toFixed(1)}초`;
    updatePhysics(dt);
    updateHazards(dt);
    updateParticles();
  }

  if(screenShake>0.01){
    ctx.save();
    const sx=(Math.random()-0.5)*screenShake*12;
    const sy=(Math.random()-0.5)*screenShake*12;
    ctx.translate(sx,sy);
    draw(t);
    ctx.restore();
  } else {
    draw(t);
  }
  rafId=requestAnimationFrame(loop);
}

// 포인터(터치/마우스) 처리: 여러 손가락이 닿아도 마지막으로 누른 위치에서만 바람이 분다
canvas.addEventListener('pointerdown', e=>{
  canvas.setPointerCapture(e.pointerId);
  const pos=localPos(e.clientX,e.clientY);
  pointers.set(e.pointerId, pos);
  activeId=e.pointerId;
  handleTap();
  if(state==='playing') applyWind(pos.x,pos.y);
});
canvas.addEventListener('pointermove', e=>{
  if(!pointers.has(e.pointerId)) return;
  const pos=localPos(e.clientX,e.clientY);
  pointers.set(e.pointerId, pos);
  if(state==='playing' && e.pointerId===activeId) applyWind(pos.x,pos.y);
});
function releasePointer(e){
  pointers.delete(e.pointerId);
  if(activeId===e.pointerId){
    const it=pointers.keys().next();
    activeId=it.done?null:it.value;
  }
}
canvas.addEventListener('pointerup', releasePointer);
canvas.addEventListener('pointercancel', releasePointer);

// 오버레이(시작/게임오버 화면) 탭도 동일하게 처리
[startOverlay, gameoverOverlay].forEach(el=>{
  el.addEventListener('pointerdown', e=>{ e.stopPropagation(); handleTap(); });
});

draw(0);
rafId=requestAnimationFrame(loop);
</script>
